# BdayHero – Server (NestJS) + Client (Nuxt)
#
# Start:        docker compose up --build
# Images bauen: docker compose build
# Pushen:       docker login && docker compose push   (Images: kidilias/bdayhero-{server,client})
#
# Konfiguration kommt aus der .env im Repo-Root (read-only in beide Container gemountet):
#  - server: liest die .env via dotenv.
#  - client: node laedt die .env via --env-file; die Keys sind NUXT_*-benannt, sodass Nuxt
#            sie in die runtimeConfig uebernimmt. Ausnahme: BACKEND_URL (Apollo-Endpoint)
#            wird beim Build gebacken.
#  Bewusst KEIN env_file: docker compose interpoliert $-Zeichen und wuerde NUXT_JWT_SECRET /
#  DATABASE_URL zerstoeren. dotenv bzw. node --env-file tun das nicht.
#
# Die Datenbank (DATABASE_URL) ist extern und nicht Teil dieses Compose-Setups.
# Bei Bedarf laesst sich ein lokaler Postgres-Service ergaenzen (siehe Kommentar unten).

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: kidilias/bdayhero-server:latest
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro
    ports:
      - "${PORT_BACKEND:-3001}:${PORT_BACKEND:-3001}"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        # Apollo-GraphQL-Endpoint wird zur Build-Zeit eingebacken (s. Client-Dockerfile)
        BACKEND_URL: "${BACKEND_URL:-http://localhost:3001}"
    image: kidilias/bdayhero-client:latest
    restart: unless-stopped
    volumes:
      # Selbe .env wie der Server; node laedt sie via --env-file (Keys sind NUXT_*-benannt)
      - ./.env:/app/.env:ro
    environment:
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "${PORT_FRONTEND:-3000}"
      PORT: "${PORT_FRONTEND:-3000}"
    ports:
      - "${PORT_FRONTEND:-3000}:${PORT_FRONTEND:-3000}"
    depends_on:
      - server

# Optionaler lokaler Postgres statt der externen DB:
#
#   db:
#     image: postgres:17
#     restart: unless-stopped
#     environment:
#       POSTGRES_USER: bday
#       POSTGRES_PASSWORD: bday
#       POSTGRES_DB: bday
#     volumes:
#       - pgdata:/var/lib/postgresql/data
#     ports:
#       - "5432:5432"
#
# Dann in der .env: DATABASE_URL="postgresql://bday:bday@db:5432/bday?schema=public"
# und beim Service `server` ergaenzen:  depends_on: [db]
#
# volumes:
#   pgdata:
